version: "3.8"

# =============================================================================
# ANeurologic Phase 5 — Advanced Optimization
# =============================================================================

services:
  aneurologic_phase5:
    build:
      context: .
      dockerfile: Dockerfile
    image: aneurologic_phase5:latest
    container_name: aneurologic_phase5
    runtime: nvidia
    network_mode: host
    shm_size: "16g"
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - CUDA_VISIBLE_DEVICES=0
      # Host lib paths: cuDNN, TensorRT (same pattern as Phase 3/4)
      - LD_LIBRARY_PATH=/host-libs:/host-cuda-libs:/usr/local/cuda/lib64:/usr/lib/aarch64-linux-gnu
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:128,garbage_collection_threshold:0.8
      - CUDA_MODULE_LOADING=LAZY
      - OMP_NUM_THREADS=4
      - HF_HOME=/workspace/models/hf_cache
      - TRANSFORMERS_CACHE=/workspace/models/hf_cache
    volumes:
      # Mount only specific subdirs — NOT .:/workspace — to preserve
      # baked-in repos (/workspace/repos/, /workspace/TensorRT-LLM)
      # from being masked by the host mount.
      - ./scripts:/workspace/scripts
      - ./outputs:/workspace/outputs
      - ./go_server:/workspace/go_server
      # Jetson host libraries: cuDNN, TensorRT, NCCL (same pattern as Phase 3/4)
      - /usr/lib/aarch64-linux-gnu:/host-libs:ro
      - /usr/local/cuda/lib64:/host-cuda-libs:ro
      # Jetson hardware monitoring
      - /sys/bus/i2c/drivers/ina3221:/sys/bus/i2c/drivers/ina3221:ro
      - /sys/class/thermal:/sys/class/thermal:ro
      - /sys/class/hwmon:/sys/class/hwmon:ro
      # HuggingFace cache (shared with Phase 1 to avoid re-downloading).
      # Override via env: HF_CACHE_DIR=/path/to/.cache/huggingface (or set
      # via .env in the same dir as this compose file).
      - ${HF_CACHE_DIR:-${HOME}/.cache/huggingface}:/workspace/models/hf_cache
      # TensorRT engine cache (persistent between runs)
      - phase5_trt_cache:/workspace/outputs/trt_engines
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  phase5_trt_cache:
    driver: local
